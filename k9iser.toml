# k9iser manifest — wrap configs into self-validating K9 contracts
# SPDX-License-Identifier: PMPL-1.0-or-later
#
# laniakea: server and client distribution infrastructure.
# ReScript/Deno client, Chainguard-based container.
# Safety-tier "yard" — server, moderate scrutiny.

[project]
name = "laniakea"
safety-tier = "yard"  # server infrastructure

# ── client/deno.json — Deno client config ────────────────────────────────────

[[configs]]
name = "deno-client"
source = "client/deno.json"
format = "json"
must = [
  "name is non-empty",
  "version is non-empty",
  "tasks.build is set",
  "tasks.test is set",
  "tasks.dev is set",
  "imports['@std/'] is set",                            # Deno std library aliased
  "imports['@rescript/core'] is set",                  # ReScript core required
  "compilerOptions.strict == true",                     # strict type checking
  "fmt.useTabs == false",                               # consistent formatting
  "fmt.lineWidth > 0",
  "fmt.indentWidth > 0",
  "no import of 'npm:typescript'",                      # TypeScript banned
]
trust = ["signed-by: ci-pipeline"]
dust = [
  "remove: deno bundle task (deprecated in Deno 2)",
  "remove: jsx/jsxImportSource if not needed",
]
intend = ["production-ready"]

# ── stapeln.toml — container layer build ─────────────────────────────────────

[[configs]]
name = "container-build"
source = "stapeln.toml"
format = "toml"
must = [
  "metadata.license == 'PMPL-1.0-or-later'",
  "metadata.registry == 'ghcr.io/hyperpolymath'",
  "build.runtime == 'podman'",
  "layers.base.from starts-with 'cgr.dev/chainguard/'",  # Chainguard base only
  "layers.base.verify == true",
  "layers.runtime.user == 'nonroot'",                    # non-root required
  "security.non-root == true",
  "security.no-new-privileges == true",
  "security.cap-drop contains 'ALL'",
  "security.signing.algorithm == 'ML-DSA-87'",           # post-quantum signing
  "security.signing.provider == 'cerro-torre'",
  "security.sbom.format == 'spdx-json'",
  "security.sbom.include-deps == true",
  "verify.vordr == true",
  "verify.svalinn == true",
  "verify.scan-on-build == true",
  "verify.fail-on contains 'critical'",
  "verify.fail-on contains 'high'",
]
trust = ["signed-by: ci-pipeline"]
dust = []
intend = ["production-ready", "supply-chain-verified"]

[validation]
strict = true
auto-fix = false
report-format = "text"
